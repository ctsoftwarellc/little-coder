name: Deploy site to GitHub Pages

# Publishes the static one-pager in site/ to GitHub Pages.
# Triggers on pushes that touch the site (or this workflow), plus manual runs.
on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

# The official Pages actions below (configure-pages@v5, upload-pages-artifact@v3,
# deploy-pages@v4) still ship on the Node.js 20 runtime, which GitHub forces to
# Node 24 on 2026-06-02 and removes on 2026-09-16. There are no newer majors that
# move them to Node 24 yet, so opt in now — this silences the deprecation warning
# and is a no-op once Node 24 becomes the default. Remove when the actions ship
# Node-24 majors.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload site/ artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
